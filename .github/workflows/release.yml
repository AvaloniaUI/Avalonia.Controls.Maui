name: Release

on:
  workflow_dispatch:
    inputs:
      push_nuget:
        description: 'Push NuGet'
        required: true
        type: boolean
        default: false

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Restore dotnet workloads
        run: |
          dotnet workload restore ${{ github.workspace }}/Avalonia.Controls.Maui.slnx --source https://api.nuget.org/v3/index.json

      - name: Create NuGet Packages
        run: |
          dotnet run --project ${{ github.workspace }}/build/_build.csproj -- --target CreateNugetPackages --configuration Release --output ${{ github.workspace }}/artifacts/packages/

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ github.workspace }}/artifacts/packages/

  publish:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: release-nuget

    if: ${{ inputs.push_nuget }}

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./packages

      - name: Push NuGet Packages
        run: |
          dotnet nuget push "./packages/**/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
