name: CICD

on:
  push:
    branches: [ "main", "release/*" ]
    tags:
      - '*'
  pull_request:
    branches: [ "main" ]
jobs:

  check-changes:
    runs-on: ubuntu-latest
    outputs:
      maui-changes: ${{ steps.filter.outputs.maui }}
      test-changes: ${{ steps.filter.outputs.test }}
      build-changes: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        continue-on-error: true
        with:
          filters: |
            maui:
              - 'src/Avalonia.Controls.Maui/**'
              - 'src/Avalonia.Controls.Maui.Graphics/**'
              - 'Directory.*.props'
              - 'Directory.*.targets'
              - 'global.json'
              - 'build/**'
            test:
              - 'tests/Avalonia.Controls.Maui.*/**'
              - 'Directory.*.props'
              - 'Directory.*.targets'
              - 'global.json'
              - 'build/**'
            build:
              - 'build/**'
              - '*.ps1'
              - '*.sh'
              - 'Directory.*.props'
              - 'Directory.*.targets'
              - 'global.json'

  build:
    needs: check-changes
    if: needs.check-changes.outputs.test-changes == 'true' || needs.check-changes.outputs.maui-changes == 'true' || needs.check-changes.outputs.build-changes == 'true'
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Restore dotnet workloads
      run: |
        dotnet workload restore ${{github.workspace}}/Avalonia.Controls.Maui.slnx --source https://api.nuget.org/v3/index.json

    - name: Create NuGet Packages
      run: dotnet run --project ${{github.workspace}}/build/_build.csproj -- --target CreateNugetPackages --configuration Release --output ${{github.workspace}}/artifacts/packages/

    - name: Upload nupkg artifacts
      uses: actions/upload-artifact@v4
      with:
          name: nupkgs
          path: ${{github.workspace}}/artifacts/**/*.nupkg
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Restore dotnet workloads
      run: |
        dotnet workload restore ${{github.workspace}}/Avalonia.Controls.Maui.slnx --source https://api.nuget.org/v3/index.json

    - name: Run Tests
      run: dotnet run --project ${{github.workspace}}/build/_build.csproj -- --target RunTests --configuration Release
      continue-on-error: false

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ${{github.workspace}}/artifacts/test-results/**/*.trx
        retention-days: 7

    - name: Upload Render Test Images
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: render-test-images
        path: |
          ${{github.workspace}}/tests/Avalonia.Controls.Maui.RenderTests/bin/Release/net10.0/*.out.png
          ${{github.workspace}}/tests/Avalonia.Controls.Maui.RenderTests/bin/Release/net10.0/*.diff.png
        if-no-files-found: ignore
        retention-days: 7